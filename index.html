<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ FinFlash · 财经快报</title>
<meta property="og:title" content="⚡ FinFlash · 财经快报">
<meta property="og:description" content="每日自动更新的财经快报 · 加密货币 · 股票 · 大宗商品 · 全球新闻">
<meta property="og:type" content="website">
<meta name="description" content="每日自动更新的财经快报，涵盖加密货币、全球股市、大宗商品、AI 科技、房地产等 7 大板块。">
<style>
  :root {
    --bg: #0a0e14; --surface: #131820; --card: #191f2b; --border: #252d3a;
    --text: #c8ccd4; --text-dim: #6b7280; --text-bright: #e8eaed;
    --green: #10b981; --green-bg: rgba(16,185,129,0.10);
    --red: #ef4444; --red-bg: rgba(239,68,68,0.10);
    --gold: #f59e0b; --blue: #3b82f6; --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.6; min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 28px 20px 20px; text-align: center;
  }
  .header h1 {
    font-family: 'SF Mono','JetBrains Mono','Menlo',monospace;
    font-size: 24px; font-weight: 700; color: var(--text-bright); letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .header .date { color: var(--text-dim); font-size: 14px; margin-top: 6px; }
  .header .tags {
    margin-top: 12px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
  }
  .header .tags span {
    font-family: 'SF Mono',monospace; font-size: 11px; padding: 4px 14px;
    border-radius: 99px; border: 1px solid var(--border); background: var(--card);
  }
  .tag-red  { color: var(--red);  border-color: rgba(239,68,68,0.3) !important; }
  .tag-gold { color: var(--gold); border-color: rgba(245,158,11,0.3) !important; }
  .tag-green{ color: var(--green);border-color: rgba(16,185,129,0.3) !important; }

  /* ── Badges ── */
  .badge-row { display: flex; justify-content: center; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; padding: 3px 12px; border-radius: 99px;
  }
  .badge-live { color: var(--green); background: var(--green-bg); }
  .badge-full { color: var(--blue); background: rgba(59,130,246,0.10); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-dot.g { background: var(--green); }
  .badge-dot.b { background: var(--blue); }

  /* ── Loading ── */
  .loading {
    text-align: center; padding: 80px 20px; color: var(--text-dim);
  }
  .loading .spinner {
    display: inline-block; width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Container ── */
  .container {
    max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px;
    display: flex; flex-direction: column; gap: 18px;
  }

  /* ── TL;DR ── */
  .tldr {
    background: linear-gradient(135deg, #141b26 0%, #1a2235 100%);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 22px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 10px;
  }
  .tldr-item {
    font-size: 13px; padding: 8px 12px; border-left: 2px solid var(--border);
  }
  .tldr-item .label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .tldr-item .value { color: var(--text-bright); font-weight: 600; margin-top: 2px; }
  .value.up   { color: var(--green); }
  .value.down { color: var(--red); }

  /* ── Cards ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .card-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 14px; color: var(--text-bright);
  }
  .card-body { padding: 18px 20px; }

  /* ── Grids ── */
  .grid-2, .grid-3 { display: grid; gap: 18px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }

  /* ── Tables ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; color: var(--text-dim); font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 0 0 10px 0; font-weight: 500; border-bottom: 1px solid var(--border);
  }
  td { padding: 7px 0; border-bottom: 1px solid rgba(37,45,58,0.4); }
  tr:last-child td { border-bottom: none; }
  .up   { color: var(--green); font-weight: 600; }
  .down { color: var(--red);   font-weight: 600; }

  /* ── Crypto tickers ── */
  .ticker-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .ticker-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px; text-align: center;
  }
  .ticker-box .name { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 4px; }
  .ticker-box .price { font-family: 'SF Mono',monospace; font-size: 30px; font-weight: 700; color: var(--text-bright); }
  .ticker-box .change { font-size: 14px; font-weight: 600; margin-top: 4px; }

  /* ── Fear gauge ── */
  .fear-bar-wrap { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .fear-bar-wrap .lbl { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .fear-bar {
    flex: 1; height: 8px; border-radius: 4px;
    background: linear-gradient(90deg, #ef4444 0%, #f59e0b 30%, #4ade80 65%, #22c55e 100%);
    position: relative;
  }
  .fear-dot {
    position: absolute; top: -4px; width: 16px; height: 16px;
    border-radius: 50%; background: white; border: 3px solid var(--bg);
    transform: translateX(-50%); transition: left 0.8s;
  }

  /* ── Heat bars ── */
  .heat-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 12px; }
  .heat-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; min-width: 50px; }
  .heat-fill { height: 100%; border-radius: 3px; transition: width 0.8s; }
  .heat-fill.top { background: linear-gradient(90deg, #f59e0b, #ef4444); }
  .heat-fill.mid { background: linear-gradient(90deg, #f59e0b, #10b981); }

  /* ── News ── */
  .news-item {
    padding: 9px 0; border-bottom: 1px solid rgba(37,45,58,0.4); font-size: 13px;
  }
  .news-item:last-child { border-bottom: none; }
  .news-item .n-title { color: var(--text-bright); font-weight: 600; }
  .news-item .n-summary { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

  /* ── Movers ── */
  .mover-section { margin-bottom: 12px; }
  .mover-section h4 { color: var(--text-bright); font-size: 13px; margin-bottom: 8px; }

  /* ── Insight ── */
  .insight {
    background: var(--surface); border-left: 3px solid var(--blue);
    padding: 12px 16px; margin-top: 14px; font-size: 12px; color: var(--text-dim);
    border-radius: 0 6px 6px 0;
  }
  .insight strong { color: var(--text-bright); }

  /* ── Footer ── */
  .footer {
    text-align: center; color: var(--text-dim); font-size: 11px;
    padding: 20px 0 10px; border-top: 1px solid var(--border); margin-top: 10px;
  }
  .footer a { color: var(--blue); text-decoration: none; }

  /* ── Stale warning ── */
  .stale-warn {
    text-align: center; padding: 12px; background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2); border-radius: var(--radius);
    font-size: 12px; color: var(--gold);
  }

  @media (max-width: 768px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .ticker-row { grid-template-columns: 1fr; }
    .header h1 { font-size: 18px; }
    .tldr { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>⚡ FinFlash</h1>
  <div class="date" id="headerDate"></div>
  <div class="tags" id="headerTags"></div>
  <div class="badge-row" id="badgeRow"></div>
</header>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p style="margin-top:16px;">正在加载今日晨报...</p>
  </div>
</div>

<div class="footer">
  <span id="footerText"></span><br>
  仅供信息参考不构成投资建议 · <a href="https://github.com/yutnskoxm-commits/morning-brief" target="_blank">GitHub</a>
</div>

<script>
// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════

const W = ['日','一','二','三','四','五','六'];

function getDateInfo() {
  const d = new Date();
  return {
    iso: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
    cn: `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 · 星期${W[d.getDay()]}`,
    ts: d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'})
  };
}

function fmt(n, d=2) {
  if (n == null) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}

function fmtChg(v) {
  if (v == null) return ['—',''];
  const cls = v >= 0 ? 'up' : 'down';
  return [`${v>=0?'+':''}${v.toFixed(2)}% ${v>=0?'▲':'▼'}`, cls];
}

function fmtPrice(v, pf='$') {
  if (v == null) return '—';
  return `${pf}${fmt(v,2)}`;
}

function fearLabel(v) {
  if (v <= 25) return ['极度恐惧','Extreme Fear','tag-red'];
  if (v <= 45) return ['恐惧','Fear','tag-red'];
  if (v <= 55) return ['中性','Neutral','tag-gold'];
  if (v <= 75) return ['贪婪','Greed','tag-green'];
  return ['极度贪婪','Extreme Greed','tag-green'];
}

// ═══════════════════════════════════════
//  LIVE API FALLBACK
// ═══════════════════════════════════════

async function fetchJSON(url) {
  const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function apiCrypto() {
  try {
    const d = await fetchJSON('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true&include_market_cap=true');
    return {
      btc: { price: d.bitcoin.usd, change: d.bitcoin.usd_24h_change, mc: d.bitcoin.usd_market_cap },
      eth: { price: d.ethereum.usd, change: d.ethereum.usd_24h_change, mc: d.ethereum.usd_market_cap }
    };
  } catch(e) { return null; }
}

async function apiFearGreed() {
  try {
    const d = await fetchJSON('https://api.alternative.me/fng/?limit=1');
    return { value: parseInt(d.data[0].value), label: d.data[0].value_classification };
  } catch(e) { return null; }
}

async function apiStock(sym) {
  try {
    const d = await fetchJSON(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`);
    const q = d.chart.result[0].indicators.quote[0];
    const closes = q.close.filter(c => c !== null);
    if (closes.length < 2) return null;
    const cur = closes[closes.length-1], prev = closes[closes.length-2];
    return { price: cur, change: ((cur-prev)/prev)*100 };
  } catch(e) { return null; }
}

async function apiGold() {
  try {
    const d = await fetchJSON('https://api.metals.live/v1/spot/gold');
    return Array.isArray(d) && d[0]?.price ? { price: d[0].price } : null;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════
//  FULL REPORT RENDERER (from JSON)
// ═══════════════════════════════════════

function renderFullReport(d) {
  const di = getDateInfo();

  // Header
  document.getElementById('headerDate').textContent = di.cn;
  document.getElementById('headerTags').innerHTML = (d.tags||[]).map((t,i) => {
    const cls = ['tag-red','tag-gold','tag-green'][i%3];
    return `<span class="${cls}">${t}</span>`;
  }).join('');
  document.getElementById('badgeRow').innerHTML = `
    <div class="badge badge-full"><div class="badge-dot b"></div>AI 完整晨报 · ${d.date}</div>
  `;
  document.getElementById('footerText').innerHTML = `⚡ AI 自动生成 · ${d.generatedAt || d.date}`;

  // TL;DR
  const tldrHTML = (d.tldr||[]).map(t =>
    `<div class="tldr-item"><div class="label">${t.label}</div><div class="value ${t.cls}">${t.value}</div></div>`
  ).join('');

  // Stocks table
  const stockRows = (d.stocks?.indices||[]).map(s => {
    const [chg, cls] = fmtChg(s.change);
    return `<tr><td>${s.flag} ${s.name}</td><td><strong>${fmt(s.price,2)}</strong></td><td class="${cls}">${chg}</td></tr>`;
  }).join('');

  // Crypto
  const c = d.crypto;
  const [btcChg, btcCls] = fmtChg(c.btc.change);
  const [ethChg, ethCls] = fmtChg(c.eth.change);
  const [fCN, fEN, fCls] = fearLabel(c.fearGreed);
  const cryptoHTML = `
    <div class="ticker-row">
      <div class="ticker-box"><div class="name">₿ Bitcoin / BTC</div><div class="price">${fmtPrice(c.btc.price)}</div><div class="change ${btcCls}">${btcChg}</div></div>
      <div class="ticker-box"><div class="name">Ξ Ethereum / ETH</div><div class="price">${fmtPrice(c.eth.price)}</div><div class="change ${ethCls}">${ethChg}</div></div>
    </div>
    <table>
      <tr><th>指标</th><th>数值</th></tr>
      <tr><td>🎭 恐惧贪婪指数</td><td class="${c.fearGreed <= 25 ? 'down' : 'up'}"><strong>${c.fearGreed}</strong> · ${fEN}</td></tr>
      ${c.totalMarketCap ? `<tr><td>📊 总市值</td><td><strong>${c.totalMarketCap}</strong></td></tr>` : ''}
      ${c.btcMonthlyChange != null ? `<tr><td>📉 BTC 月跌幅</td><td class="down">${c.btcMonthlyChange}%</td></tr>` : ''}
      ${c.ethMonthlyChange != null ? `<tr><td>📉 ETH 月跌幅</td><td class="down">${c.ethMonthlyChange}%</td></tr>` : ''}
    </table>
    <div class="fear-bar-wrap">
      <span class="lbl">恐惧</span><div class="fear-bar"><div class="fear-dot" style="left:${c.fearGreed}%"></div></div><span class="lbl">贪婪</span>
    </div>
    ${c.highlights ? `
    <div style="margin-top:14px;font-weight:600;color:var(--text-bright);font-size:12px;">📰 重要动态</div>
    ${c.highlights.map(h => `<div class="news-item">${h}</div>`).join('')}` : ''}
  `;

  // Stock Movers
  const moversUS = (d.stockMovers?.us||[]).map(s =>
    `<div class="news-item"><strong>${s.name}</strong> <span class="${s.change==='up'?'up':'down'}">${s.change==='up'?'🟢':'🔴'}</span> · ${s.detail}</div>`
  ).join('');
  const moversCN = (d.stockMovers?.cn||[]).map(s =>
    `<div class="news-item"><strong>${s.name}</strong> <span class="${s.change==='up'?'up':'down'}">${s.change==='up'?'🟢':'🔴'}</span> · ${s.detail}</div>`
  ).join('');
  const heatHTML = (d.stockMovers?.hotSectors||[]).map(h =>
    `<div class="heat-row">${h.name} <div class="heat-bar"><div class="heat-fill ${h.heat>=70?'top':'mid'}" style="width:${h.heat}%"></div></div> <span style="color:var(--text-dim);font-size:11px">${h.note}</span></div>`
  ).join('');

  // World News
  const newsHTML = (d.worldNews||[]).map(n =>
    `<tr><td>${n.flag}</td><td><strong>${n.title}</strong></td><td>${n.summary}</td></tr>`
  ).join('');

  // Commodities
  const commRows = (d.commodities?.items||[]).map(c => {
    const [chg, cls] = fmtChg(c.change);
    return `<tr><td>${c.icon} ${c.name}</td><td><strong>${c.price}</strong>${c.unit}</td><td class="${cls}">${chg}</td></tr>`;
  }).join('');

  // Tech AI
  const techHTML = (d.techAI||[]).map(t =>
    `<div class="news-item"><div class="n-title">${t.title}</div><div class="n-summary">${t.summary}</div></div>`
  ).join('');

  // Property
  const propHTML = (d.property||[]).map(p =>
    `<div class="news-item"><div class="n-title">${p.title}</div><div class="n-summary">${p.summary}</div></div>`
  ).join('');

  // ── Assemble ──
  document.getElementById('app').innerHTML = `
    <div class="tldr">${tldrHTML}</div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">📊 大盘指数 · Global Markets</div>
        <div class="card-body">
          <table>${stockRows}</table>
          ${d.stocks?.insight ? `<div class="insight">💡 ${d.stocks.insight}</div>` : ''}
        </div>
      </div>
      <div class="card">
        <div class="card-header">🪙 加密货币 · Crypto</div>
        <div class="card-body">${cryptoHTML}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">💹 热门个股 & 板块 · Stock Movers</div>
      <div class="card-body">
        <div class="grid-2">
          <div class="mover-section"><h4>🇺🇸 美股</h4>${moversUS}</div>
          <div class="mover-section"><h4>🇨🇳 A 股 / 港股</h4>${moversCN}</div>
        </div>
        <div style="margin-top:14px;font-weight:600;color:var(--text-bright);font-size:12px;">🔥 热点板块热度</div>
        ${heatHTML}
      </div>
    </div>

    <div class="card">
      <div class="card-header">🌍 全球宏观 · World Brief</div>
      <div class="card-body"><table>${newsHTML}</table></div>
    </div>

    <div class="grid-3">
      <div class="card">
        <div class="card-header">🛢️ 大宗商品 · Commodities</div>
        <div class="card-body">
          <table>${commRows}</table>
          ${d.commodities?.insight ? `<div class="insight">💡 ${d.commodities.insight}</div>` : ''}
        </div>
      </div>
      <div class="card">
        <div class="card-header">🤖 科技 & AI · Tech Scan</div>
        <div class="card-body">${techHTML || '<div style="color:var(--text-dim)">📭 暂无数据</div>'}</div>
      </div>
      <div class="card">
        <div class="card-header">🏠 房地产 · Property Pulse</div>
        <div class="card-body">${propHTML || '<div style="color:var(--text-dim)">📭 暂无数据</div>'}</div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════
//  API FALLBACK RENDERER
// ═══════════════════════════════════════

function renderLiveDash(data, di) {
  const { crypto, fg, gold, stocks, oil } = data;

  document.getElementById('headerDate').textContent = di.cn;
  document.getElementById('badgeRow').innerHTML = `
    <div class="badge badge-live"><div class="badge-dot g"></div>实时行情 · ${di.ts} 更新</div>
    <div class="stale-warn" style="padding:4px 10px;font-size:10px;background:transparent;border:0;color:var(--gold)">AI 完整晨报尚未生成，当前为实时行情看板</div>
  `;

  const tags = [];
  if (fg) {
    const [cn, en, cls] = fearLabel(fg.value);
    tags.push(`<span class="${cls}">🎭 ${cn} · ${en}</span>`);
  }
  if (stocks?.sp500?.change < -0.3) tags.push('<span class="tag-red">📉 全球承压</span>');
  document.getElementById('headerTags').innerHTML = tags.join('');

  // TL;DR
  const tl = [];
  if (crypto) tl.push({label:'🪙 Bitcoin',value:`${fmtPrice(crypto.btc.price)}`,cls:crypto.btc.change>=0?'up':'down'});
  if (fg) tl.push({label:'🎭 恐惧指数',value:`${fg.value} · ${fg.label}`,cls:fg.value<=25?'down':'up'});
  if (stocks?.nasdaq) tl.push({label:'📊 纳斯达克',value:fmt(stocks.nasdaq.price),cls:stocks.nasdaq.change>=0?'up':'down'});
  if (gold) tl.push({label:'🥇 黄金',value:`${fmtPrice(gold.price)}/oz`,cls:'up'});
  if (oil) tl.push({label:'🛢️ 原油 WTI',value:`${fmtPrice(oil.price)}/bbl`,cls:oil.change>=0?'up':'down'});
  const tldrHTML = tl.map(t =>
    `<div class="tldr-item"><div class="label">${t.label}</div><div class="value ${t.cls}">${t.value}</div></div>`
  ).join('');

  // Stocks
  const stockMap = [
    ['🇨🇳 上证 SSE', stocks?.sse], ['🇭🇰 恒生 HSI', stocks?.hsi],
    ['🇺🇸 标普 S&P 500', stocks?.sp500], ['🇺🇸 纳斯达克 NASDAQ', stocks?.nasdaq], ['🇺🇸 道琼斯 DJIA', stocks?.dji]
  ];
  const stockRows = stockMap.map(([n,s]) => {
    if (s) { const [chg,cls] = fmtChg(s.change); return `<tr><td>${n}</td><td><strong>${fmt(s.price)}</strong></td><td class="${cls}">${chg}</td></tr>`; }
    return `<tr><td>${n}</td><td colspan="2" style="color:var(--text-dim)">📭 CORS 限制</td></tr>`;
  }).join('');

  // Crypto
  let cryptoHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px">📭 加载中...</div>';
  if (crypto) {
    const [bc, bcls] = fmtChg(crypto.btc.change);
    const [ec, ecls] = fmtChg(crypto.eth.change);
    const dom = (crypto.btc.mc && crypto.eth.mc) ? ((crypto.btc.mc/(crypto.btc.mc+crypto.eth.mc))*100).toFixed(1) : null;
    cryptoHTML = `
      <div class="ticker-row">
        <div class="ticker-box"><div class="name">₿ Bitcoin / BTC</div><div class="price">${fmtPrice(crypto.btc.price)}</div><div class="change ${bcls}">${bc}</div></div>
        <div class="ticker-box"><div class="name">Ξ Ethereum / ETH</div><div class="price">${fmtPrice(crypto.eth.price)}</div><div class="change ${ecls}">${ec}</div></div>
      </div>
      <table>
        <tr><th>指标</th><th>数值</th></tr>
        ${fg ? `<tr><td>🎭 恐惧贪婪指数</td><td class="${fg.value<=25?'down':'up'}"><strong>${fg.value}</strong> · ${fg.label}</td></tr>` : ''}
        ${dom ? `<tr><td>📊 BTC 市值占比</td><td><strong>${dom}%</strong></td></tr>` : ''}
      </table>
      ${fg ? `<div class="fear-bar-wrap"><span class="lbl">恐惧</span><div class="fear-bar"><div class="fear-dot" style="left:${fg.value}%"></div></div><span class="lbl">贪婪</span></div>` : ''}
    `;
  }

  // Commodities
  const commRows = [];
  commRows.push(gold
    ? `<tr><td>🥇 黄金 Gold</td><td><strong>${fmtPrice(gold.price)}</strong>/oz</td><td style="color:var(--text-dim)">实时</td></tr>`
    : `<tr><td>🥇 黄金 Gold</td><td colspan="2" style="color:var(--text-dim)">📭 暂无</td></tr>`);
  commRows.push(oil
    ? (()=>{const [chg,cls]=fmtChg(oil.change);return `<tr><td>🛢️ 原油 WTI</td><td><strong>${fmtPrice(oil.price)}</strong>/bbl</td><td class="${cls}">${chg}</td></tr>`;})()
    : `<tr><td>🛢️ 原油 WTI</td><td colspan="2" style="color:var(--text-dim)">📭 CORS 限制</td></tr>`);
  commRows.push(`<tr><td>🔩 铜 Copper</td><td colspan="2" style="color:var(--text-dim)">📭 暂无</td></tr>`);

  document.getElementById('app').innerHTML = `
    <div class="tldr">${tldrHTML}</div>
    <div class="stale-warn">⚠️ 今日 AI 完整晨报尚未生成。以下为实时行情数据，全球宏观 / 科技 AI / 房地产等板块将在晨报生成后展示。</div>
    <div class="grid-2">
      <div class="card"><div class="card-header">📊 大盘指数 · Global Markets</div><div class="card-body"><table>${stockRows}</table><div class="insight">💡 股票数据受浏览器 CORS 限制，部分指数无法实时获取。AI 完整晨报无此问题。</div></div></div>
      <div class="card"><div class="card-header">🪙 加密货币 · Crypto</div><div class="card-body">${cryptoHTML}</div></div>
    </div>
    <div class="card"><div class="card-header">🛢️ 大宗商品 · Commodities</div><div class="card-body"><table>${commRows}</table></div></div>
    <div class="card"><div class="card-header">🤖📰🌍 完整晨报板块</div><div class="card-body">
      <div class="news-item"><span style="color:var(--text-dim)">💹 活跃个股/板块 · 🌍 全球宏观 · 🤖 科技/AI · 🏠 房地产</span></div>
      <div class="news-item"><span style="color:var(--text-dim)">以上板块需 AI 每日生成。今天的完整晨报将在首次生成后自动展示。</span></div>
    </div></div>
  `;

  document.getElementById('footerText').innerHTML = `🔄 实时数据 · 更新于 ${di.ts}`;
}

// ═══════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════

async function main() {
  const di = getDateInfo();

  // 1. Try to load today's full JSON report
  try {
    const jsonUrl = `reports/${di.iso}.json`;
    const resp = await fetch(jsonUrl, { signal: AbortSignal.timeout(5000) });
    if (resp.ok) {
      const data = await resp.json();
      renderFullReport(data);
      // Still refresh live crypto prices in background
      refreshLivePrices(data);
      return;
    }
  } catch(e) {
    console.log('JSON report not available, falling back to live API');
  }

  // 2. Check for native desktop app pre-injected data (bypasses CORS)
  if (window.__finflashNative) {
    console.log('[FinFlash] Using native app data');
    renderLiveDash(window.__finflashNative, di);
    return;
  }

  // 3. Fallback: live API dashboard
  document.getElementById('headerDate').textContent = di.cn;
  document.getElementById('headerTags').innerHTML = '<span style="color:var(--text-dim);font-size:12px">正在获取实时数据...</span>';

  const [crypto, fg, gold, sse, hsi, sp500, nasdaq, dji, oil] = await Promise.all([
    apiCrypto(), apiFearGreed(), apiGold(),
    apiStock('000001.SS'), apiStock('^HSI'), apiStock('^GSPC'),
    apiStock('^IXIC'), apiStock('^DJI'),
    apiStock('CL=F')
  ]);

  renderLiveDash({ crypto, fg, gold, stocks: { sse, hsi, sp500, nasdaq, dji }, oil }, di);
}

async function refreshLivePrices(data) {
  // Silently refresh crypto and gold prices
  const [crypto, fg, gold] = await Promise.all([apiCrypto(), apiFearGreed(), apiGold()]);
  if (crypto) {
    data.crypto.btc.price = crypto.btc.price;
    data.crypto.btc.change = crypto.btc.change;
    data.crypto.eth.price = crypto.eth.price;
    data.crypto.eth.change = crypto.eth.change;
  }
  if (fg) { data.crypto.fearGreed = fg.value; data.crypto.fearLabel = fg.label; }
  if (gold && data.commodities?.items?.[0]) {
    data.commodities.items[0].price = '$' + fmt(gold.price, 2);
  }
  // Re-render with updated prices
  if (crypto || fg || gold) renderFullReport(data);
}

main().catch(err => {
  console.error(err);
  document.getElementById('app').innerHTML = `
    <div class="loading">
      <p style="color:var(--red)">⚠️ 加载失败</p>
      <p style="color:var(--text-dim);font-size:12px;margin-top:8px">${err.message}</p>
      <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:var(--blue);color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;">🔄 重新加载</button>
    </div>
  `;
});
</script>
